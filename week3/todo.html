<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #16213e;
      border-radius: 15px;
      padding: 30px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      color: #e94560;
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 15px;
      border-radius: 8px;
      border: 2px solid #0f3460;
      background: #0f3460;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #e94560;
    }

    button.add-btn {
      padding: 12px 18px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
    }

    button.add-btn:hover { background: #c73652; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #a0a0b0;
      cursor: pointer;
      font-size: 13px;
    }

    .filters button.active {
      background: #00d4ff;
      color: black;
      font-weight: bold;
    }

    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      background: #0f3460;
      margin-bottom: 10px;
      padding: 12px 15px;
      border-radius: 8px;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #e94560;
      cursor: pointer;
    }

    .task-text {
      flex: 1;
      color: white;
      font-size: 15px;
    }

    .task-text.done {
      text-decoration: line-through;
      color: #a0a0b0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #e94560;
      font-size: 18px;
      cursor: pointer;
    }

    .delete-btn:hover { color: #ff6b6b; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
    }

    .count { color: #a0a0b0; font-size: 13px; }

    .clear-btn {
      background: none;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .clear-btn:hover { background: #e94560; color: white; }

    .empty {
      text-align: center;
      color: #a0a0b0;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 To-Do List</h1>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task..." />
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="filters">
    <button class="active" onclick="filterTasks('all', this)">All</button>
    <button onclick="filterTasks('active', this)">Active</button>
    <button onclick="filterTasks('done', this)">Done</button>
  </div>

  <ul class="task-list" id="taskList"></ul>

  <div class="footer">
    <span class="count" id="taskCount">0 tasks left</span>
    <button class="clear-btn" onclick="clearDone()">Clear Done</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
  let currentFilter = 'all';

  // Add task on Enter key
  document.getElementById('taskInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addTask();
  });

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (text === '') return;

    tasks.push({ id: Date.now(), text, done: false });
    input.value = '';
    saveTasks();
    renderTasks();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
    saveTasks();
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    renderTasks();
  }

  function filterTasks(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filters button')
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    let filtered = tasks;

    if (currentFilter === 'active') filtered = tasks.filter(t => !t.done);
    if (currentFilter === 'done')   filtered = tasks.filter(t => t.done);

    if (filtered.length === 0) {
      list.innerHTML = '<p class="empty">No tasks here! 🎉</p>';
    } else {
      list.innerHTML = filtered.map(t => `
        <li class="task-item">
          <input type="checkbox" ${t.done ? 'checked' : ''}
                 onchange="toggleTask(${t.id})">
          <span class="task-text ${t.done ? 'done' : ''}">${t.text}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})">🗑</button>
        </li>
      `).join('');
    }

    const remaining = tasks.filter(t => !t.done).length;
    document.getElementById('taskCount').textContent =
      `${remaining} task${remaining !== 1 ? 's' : ''} left`;
  }

  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  renderTasks();
</script>
</body>
</html>
